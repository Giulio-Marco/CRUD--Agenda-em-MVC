<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agenda de Contatos</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      color: #222;
      padding: 30px 15px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .bloco {
      background-color: #ffffff;
      border: 1px solid #d8d8d8;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    h1, h2 {
      margin-top: 0;
    }

    p {
      color: #555;
    }

    form {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #cfcfcf;
      border-radius: 6px;
      font-size: 14px;
    }

    .linha-botao {
      grid-column: 1 / -1;
    }

    .btn-salvar,
    .btn-remover {
      border: none;
      border-radius: 6px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-salvar {
      background-color: #2f6f4f;
      color: #fff;
    }

    .btn-remover {
      background-color: #e7c6c6;
      color: #7a1f1f;
    }

    .feedback {
      display: none;
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
    }

    .feedback.visivel {
      display: block;
    }

    .feedback.sucesso {
      background-color: #e8f4ec;
      color: #1f5c38;
      border: 1px solid #bfdcc8;
    }

    .feedback.erro {
      background-color: #f8e7e7;
      color: #962d2d;
      border: 1px solid #e3baba;
    }

    .tabela-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th,
    td {
      border-bottom: 1px solid #dddddd;
      padding: 12px;
      text-align: left;
    }

    th {
      background-color: #f0f0f0;
    }

    .linha-vazia td {
      text-align: center;
      color: #666;
      font-style: italic;
    }

    @media (max-width: 700px) {
      form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="bloco">
      <h1>Agenda de Contatos</h1>
      <p>Exemplo simples de CRUD com JavaScript seguindo a organização MVC.</p>
    </section>

    <section class="bloco">
      <h2>Novo contato</h2>
      <form id="form-contato">
        <div>
          <label for="nome">Nome</label>
          <input id="nome" name="nome" type="text" placeholder="Digite o nome" />
        </div>

        <div>
          <label for="telefone">Telefone</label>
          <input id="telefone" name="telefone" type="tel" placeholder="(00) 00000-0000" />
        </div>

        <div>
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" placeholder="email@exemplo.com" />
        </div>

        <div class="linha-botao">
          <button type="submit" class="btn-salvar">Salvar contato</button>
        </div>

        <div id="feedback" class="feedback"></div>
      </form>
    </section>

    <section class="bloco">
      <h2>Lista de contatos</h2>
      <p>Os dados ficam salvos no navegador usando localStorage.</p>

      <div class="tabela-wrapper">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Telefone</th>
              <th>E-mail</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody id="lista-contatos"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
